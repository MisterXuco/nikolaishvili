<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Access</title>

<style>
body{
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    text-align:center;
    background:#111;
    padding:40px;
    border-radius:20px;
    width:300px;
}

input{
    width:90%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>საიდუმლო პაროლი</h1>

    <input type="password" id="password" placeholder="ჩაწერე პაროლი">

    <br>

    <button onclick="checkPassword()">შესვლა</button>

    <p id="error"></p>
</div>

<script>
function checkPassword(){

    let password = document.getElementById("password").value;

    if(password === "BeMine"){
        window.location.href = "home.html";
    } else {
        document.getElementById("error").innerHTML = "არასწორი პაროლი";
    }
}
</script>

</body>
</html>
